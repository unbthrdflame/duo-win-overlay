<!DOCTYPE html>
<html>
<head>
  
<meta charset="utf-8">

<style>

body{
background:transparent;
margin:0;
font-family: "Arial Black", sans-serif;
}

.container{
position:absolute;
right:0;
text-align:right;
}

.label{
color:#8B004B;
letter-spacing: 3px;
font-size:100px;
font-weight:700;
}

.percent{
color:#8B004B;
font-size:100px;
font-weight:700;
}

</style>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6L7u0X3J2U1tfTkIkI9KE4eRy57CLKNc",
  authDomain: "wins-counter.firebaseapp.com",
  databaseURL: "https://wins-counter-default-rtdb.firebaseio.com/",
  projectId: "wins-counter",
  storageBucket: "wins-counter.firebasestorage.app",
  messagingSenderId: "427593572666",
  appId: "1:427593572666:web:7a7e6ce4b4806b6dddbb03"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getelementyid("pct").innertext = "test;

const winsRef = ref(db, "wins");
const lossesRef = ref(db, "losses");

let wins = 0;
let losses = 0;

function updateDisplay() {
  const total = wins + losses;
  const pct = total === 0 ? 0 : Math.round((wins / total) * 100);
  document.getElementById("pct").innerText = pct + "%";
}

onValue(winsRef, (snap) => {
  wins = snap.val()  0;
  updateDisplay();
});

onValue(lossesRef, (snap) => {
  losses = snap.val()  0;
  updateDisplay();
});
</script>

</head>

<body>

<div class="container">

<div class="label">
WINS
</div>

<div class="percent" id="pct">
0%
</div>

</div>

<script>

async function update(){

let data = await fetch("data.json");
let stats = await data.json();

let wins = stats.wins;
let losses = stats.losses;

let percent = 0;

if(wins + losses > 0){
percent = Math.round((wins/(wins+losses))*100);
}

document.getElementById("percent").innerText = percent + "%";

}

setInterval(update,1000);

</script>

<script>

async function updateOverlay(){

    try{

        const response = await fetch("http://127.0.0.1:8080/GetGlobalVariable?name=winPercent");
        const percent = await response.text();

        const winsResponse = await fetch("http://127.0.0.1:8080/GetGlobalVariable?name=wins");
        const wins = await winsResponse.text();

        document.getElementById("percent").innerText = percent + "%";
        document.getElementById("wins").innerText = wins;

    }catch(err){
        console.log("waiting for Streamer.bot...");
    }

}

setInterval(updateOverlay,1000);

</script>
  
</body>
</html>
